name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/apps/horizon
            git pull origin main
            docker build -t theta-india .
            docker stop horizon || true
            docker rm horizon || true
            docker run -d --name horizon --env-file .env -p 8002:8002 --restart unless-stopped theta-india
            sleep 3
            curl -sf http://localhost:8002/health
            echo "✅ Deploy successful"
